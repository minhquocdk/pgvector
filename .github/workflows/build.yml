name: build
on:
  workflow_dispatch: # Thêm dòng này để kích hoạt nút "Run workflow" bằng tay

jobs:
  windows:
    runs-on: ${{ matrix.os }}
    if: ${{ !startsWith(github.ref_name, 'mac') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - postgres: 17
            os: windows-2025
          - postgres: 14
            os: windows-2022
    steps:
      - uses: actions/checkout@v7

      - uses: ankane/setup-postgres@v1
        with:
          postgres-version: ${{ matrix.postgres }}

      # 1. Thêm bước này để tự động thiết lập môi trường Visual Studio x64
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 2. Bây giờ bạn có thể gọi thẳng nmake mà không cần dùng lệnh 'call "C:\..." && ^' nữa
      - name: Build and Test
        run: |
          nmake /NOLOGO /F Makefile.win && ^
          nmake /NOLOGO /F Makefile.win install && ^
          nmake /NOLOGO /F Makefile.win installcheck ${{ matrix.postgres != 17 && 'PG_REGRESS=$(PGROOT)\bin\pg_regress' || '' }}
        shell: cmd

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-pg${{ matrix.postgres }}-${{ matrix.os }}
          # Thay đổi đường dẫn 'path' dưới đây cho đúng với file bạn muốn giữ (ví dụ file .dll hoặc thư mục cụ thể)
          path: |
            *.dll
            *.so
            *.sql
            *.control
          if-no-files-found: warn

      - if: ${{ failure() }}
        name: Show test diffs on failure
        run: if exist regression.diffs cat regression.diffs
        shell: cmd
