name: build
on:
  workflow_dispatch: # Thêm dòng này để kích hoạt nút "Run workflow" bằng tay

jobs:
  windows:
    runs-on: ${{ matrix.os }}
    if: ${{ !startsWith(github.ref_name, 'mac') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - postgres: 18
            os: windows-2022
    steps:
      - uses: actions/checkout@v7

      - name: Install PostgreSQL 18.2 Manually
        run: |
          echo "=== Dang tai PostgreSQL 18.2 Binaries cho Windows ==="
          # Tải trực tiếp file zip chính thức từ EnterpriseDB
          curl -L "https://sbp.enterprisedb.com/getbinary.jsp?file_id=12613" -o postgresql-18.2.zip
          
          echo "=== Dang giai nen vao thu muc C:\pg18 ==="
          powershell Expand-Archive -Path postgresql-18.2.zip -DestinationPath C:\pg18
          
          echo "=== Cau hinh bien moi truong he thong ==="
          echo "PGROOT=C:\pg18\pgsql" >> %GITHUB_ENV%
          echo "C:\pg18\pgsql\bin" >> %GITHUB_PATH%
        shell: cmd
        
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 2. Bây giờ bạn có thể gọi thẳng nmake mà không cần dùng lệnh 'call "C:\..." && ^' nữa
      - name: Build and Test
        run: |
          nmake /NOLOGO /F Makefile.win && ^
          nmake /NOLOGO /F Makefile.win install && ^
        shell: cmd

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-pg${{ matrix.postgres }}-${{ matrix.os }}
          # Thay đổi đường dẫn 'path' dưới đây cho đúng với file bạn muốn giữ (ví dụ file .dll hoặc thư mục cụ thể)
          path: |
            *.dll
            *.so
            *.sql
            *.control
          if-no-files-found: warn

      - if: ${{ failure() }}
        name: Show test diffs on failure
        run: if exist regression.diffs cat regression.diffs
        shell: cmd
